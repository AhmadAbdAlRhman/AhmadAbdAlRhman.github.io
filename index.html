<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <title>أحمد حاج نجيب | مطور برمجيات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui; }
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(16px); }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-zinc-900 text-white min-h-screen">

  <!-- Hero -->
  <section class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="text-center z-10">
      <img src="رابط-صورتك.jpg" class="w-48 h-48 mx-auto rounded-3xl border-4 border-blue-500 shadow-2xl">
      <h1 class="text-6xl font-bold mt-6">أحمد حاج نجيب</h1>
      <p class="text-2xl text-blue-400 mt-3">مطور Node.js & Backend | طالب علوم حاسوب</p>
      <div class="mt-10 flex gap-6 justify-center">
        <a href="#" class="px-8 py-4 bg-blue-600 rounded-2xl hover:bg-blue-700 transition">تحميل السيرة الذاتية</a>
        <a href="#projects" class="px-8 py-4 border border-white rounded-2xl hover:bg-white hover:text-black transition">شاهد مشاريعي</a>

  <!-- Skills -->
  <section class="py-20 px-10">
    <h2 class="text-4xl font-bold text-center mb-12">المهارات</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-5xl mx-auto">
      <div class="glass p-8 rounded-3xl text-center hover:scale-105 transition">Node.js</div>
      <div class="glass p-8 rounded-3xl text-center hover:scale-105 transition">Laravel</div>
      <div class="glass p-8 rounded-3xl text-center hover:scale-105 transition">JavaScript</div>
      <div class="glass p-8 rounded-3xl text-center hover:scale-105 transition">PHP</div>
    </div>
  </section>

  <!-- Projects (أضف مشاريعك الحقيقية هنا) -->
  <section id="projects" class="py-20 bg-black/30">
    <h2 class="text-4xl font-bold text-center mb-12">مشاريعي</h2>
    <!-- أضف بطاقات مشاريع هنا -->
  </section>

  <!-- Footer -->
  <footer class="py-10 text-center border-t border-white/10">
    <p>© 2026 أحمد حاج نجيب • Made with ❤️ and Tailwind</p>
  </footer>

</html>
